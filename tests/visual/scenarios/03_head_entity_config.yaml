id: head_entity_config
description: Scenario with head entity configured with icon and secondary info
view_path: head-entity-config

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.ceiling_lights
      brightness: 255
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.kitchen_lights
      brightness: 255

card:
  type: entities
  entities:
    - type: custom:fold-entity-row
      head:
        entity: light.bed_light
        name: Head
      entities:
        - entity: light.bed_light
          name: First
        - light.ceiling_lights
        - light.kitchen_lights

interactions:
  - type: click
    root: fold-entity-row
    selector: ha-icon-button
    settle_ms: 100

assertions:
  - type: snapshot
    name: "03_head_entity_config"
    threshold: 0.02