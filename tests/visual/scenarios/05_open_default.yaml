id: open_default
description: Scenario with default open state
view_path: open-default

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.ceiling_lights
      brightness: 255
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.kitchen_lights
      brightness: 255

card:
  type: entities
  entities:
    - type: custom:fold-entity-row
      head: light.bed_light
      open: true
      entities:
        - light.bed_light
        - light.ceiling_lights
        - light.kitchen_lights

assertions:
  - type: snapshot
    name: "05_open_default"
    threshold: 0.02