id: doc_readme_basic_usage
description: README basic usage example
view_path: readme-standard

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255

card:
  type: entities
  entities:
    - light.bed_light
    - type: custom:fold-entity-row
      head: light.bed_light
      entities:
        - light.bed_light
        - light.ceiling_lights
        - light.kitchen_lights

doc_animation:
  output: docs/source/assets/images/01_basic_usage.gif
  root: hui-entities-card
  interval_ms: 66
  padding: 16
  threshold: 0.02
  cursor: pointer
  segments:
    - frames: 7   # ~0.5 s
    - interactions:
        - type: hover
          root: fold-entity-row
          selector: ha-icon-button
          settle_ms: 100
      frames: 14   # ~1 s
    - interactions:
        - type: click
          root: fold-entity-row
          selector: ha-icon-button
          settle_ms: 50
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: click
          root: fold-entity-row
          selector: ha-icon-button
          settle_ms: 50
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: hover_away
      frames: 14   # ~1 s