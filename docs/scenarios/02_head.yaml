id: doc_readme_head
description: README head example
view_path: readme-head

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.all_lights
      brightness: 255

card:
  type: entities
  entities:
    - type: custom:fold-entity-row
      open: true
      head:
        type: section
        label: Customizations
      entities:
        - light.bed_light
        - entity: light.ceiling_lights
          name: A light
        - light.kitchen_lights

doc_image:
  output: docs/source/assets/images/02_head.png
  root: hui-entities-card
  padding: 16
  threshold: 0.02